# Project information
site_name: ""
site_description: "Zero trust CNAPP"
site_author: "AccuKnox"

#Sitemap: https://help.accuknox.com/sitemap.xml
site_url: "https://help.accuknox.com/"

# Copyright
copyright: "&copy; 2024 AccuKnox. All Rights Reserved."

# Repository
repo_name: "GitHub"
repo_url: "https://github.com/kubearmor/KubeArmor"
edit_uri: "https://github.com/accuknox/help-test/edit/main/docs"

# Configuration
docs_dir: "docs"
dev_addr: '127.0.0.1:8000'

# Theme
theme:
  name: "material"
  custom_dir: overrides
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.path
    - navigation.indexes
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      # accent: blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  language: "en"
  shortcuts:
    help: 191 # ?
    next: 78 # n
    previous: 80 # p
    search: 83 # s
  font:
    text: 'Open Sans'
    code: 'Fira Code'
  logo_dark_mode: 'assets/images/logo-white.png'
  logo_light_mode: 'assets/images/logo-white.png'
  favicon: 'assets/images/favicon.ico'
  # hide:
  # - toc

# Extensions
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - abbr
  - tables
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      toc_depth: "3"
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-experimental
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - neoteroi.cards
plugins:
  - external-markdown
  - search:
      separator: '[\s\-\.]+'
      lang:
        - en
  - redirects:
        redirect_maps:
            'index.md': 'introduction/home.md'
# Customization
extra_css:
- "assets/stylesheets/style.css"
- "assets/stylesheets/extra.css"
- "assets/stylesheets/neoteroi-mkdocs.css"
- "assets/stylesheets/banner.css"
extra_javascript:
  - javascripts/extra.js
extra:
  analytics:
    provider: google
    property: G-QP9CWLWH0P
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target=_blank>feedback form</a>.
  manifest: "manifest.json"
  social:
    - icon: "fontawesome/brands/github-alt"
      link: "https://github.com/accuknox"
    - icon: "fontawesome/brands/twitter"
      link: "https://twitter.com/AccuKnox"
    - icon: "fontawesome/brands/slack"
      link: "https://kubearmor.slack.com/join/shared_invite/zt-1ltmqdbc6-rSHw~LM6MesZZasmP2hAcA#/shared-invite/email"
    - icon: "fontawesome/brands/linkedin"
      link: "https://www.linkedin.com/company/accuknox/?original_referer=https%3A%2F%2Fwww.accuknox.com%2F"
    - icon: "fontawesome/brands/youtube"
      link: "https://www.youtube.com/channel/UCLqK0vGQTa2ctjnbNzvP52Q"
    - icon: "fontawesome/brands/wordpress"
      link: "https://www.accuknox.com/"
